# Buster example configuration.
# Copy to your Buster home (see `buster config` for the active path) as config.toml.
# All values shown are the built-in defaults — Buster runs fine with no file.

[server]
host = "127.0.0.1"      # localhost only by default
port = 8765
lan_access = false      # enabling LAN access requires a token (set during onboarding)
lan_token = ""
# LAN naming (multiple Busters coexist): each node = <node_name>.<domain>,
# e.g. "alderaan.buster.home", plus a bare "<domain>" alias.
domain = "buster.local"   # use "buster.home" if your local DNS (Pi-hole) serves .home
node_name = ""            # blank = derive from the machine hostname
advertise_alias = true    # also answer to the bare <domain> ("whichever node")

[inference]
policy = "local_first_ask_external"   # local_only | local_first_ask_external | local_first_auto_lan | no_restriction
default_provider = "ollama"             # ollama | lmstudio | remote
default_model = ""                      # e.g. "gemma3:latest"; blank = auto-pick
ollama_url = "http://127.0.0.1:11434"
lan_ollama_urls = []                    # e.g. ["http://alderaan.home:11434"]
lmstudio_urls = []                      # OpenAI-compatible, incl. /v1 — e.g. ["http://127.0.0.1:1234/v1"]
max_steps = 8
tool_timeout_seconds = 30

# Gated remote provider (OFF by default). When enabled AND policy = "no_restriction",
# Buster may send prompts to this OpenAI-compatible endpoint — data LEAVES your
# network and every such response is labelled + audited. Use only endpoints you trust.
[inference.remote]
enabled = false
kind = "openai_compatible"              # openai_compatible | anthropic
name = "remote"
base_url = ""                           # blank = provider default; or a self-hosted TGI/vLLM / HF endpoint
api_key = ""                            # redacted from logs/prompts/reports
model = ""                              # e.g. "gpt-4o" (openai_compatible) or "claude-sonnet-4-5" (anthropic)
# Example — hosted Claude (only used when policy = "no_restriction"):
#   kind = "anthropic"
#   api_key = "sk-ant-..."
#   model = "claude-sonnet-4-5"

[cache]
memory_limit_mb = 64
disk_limit_mb = 1024
default_ttl_seconds = 3600

[discovery]
enabled = true
advertise_buster = true
scan_local_network = false              # mDNS scan off by default
service_urls = []                       # manually configured LCDP service base URLs

[buildly]
workspace_enabled = false
mode = "none"                           # none | local_mcp | hosted_mcp | account
mcp_url = ""
account_email = ""

[personality]
profile = "friendly_guide"              # friendly_guide | quiet_operator | technical_partner | research_companion | household_assistant
learning_enabled = false

[runtimes]
detect = true
allow_task_submission = false           # submitting tasks to real external runtimes is off by default

[scheduler]
enabled = true
poll_interval_seconds = 60
low_disk_percent = 90.0
high_memory_percent = 90.0

[onboarding]
completed = false
